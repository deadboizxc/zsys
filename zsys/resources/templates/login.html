<!DOCTYPE html>
<html data-bs-theme="dark">
<head>
    <title>ZXC-USERBOT - Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        :root {
            --bs-body-bg: #2b1e3d;
            --bs-body-color: #f1f0f5;
            --bs-card-bg: #3b2c56;
            --bs-border-color: #6a4b94;
            --primary-color: #9c27b0;
            --secondary-color: #ba68c8;
            --error-color: #cf6679;
        }

        body {
            background-color: var(--bs-body-bg);
            color: var(--bs-body-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-image: linear-gradient(to bottom right, #2b1e3d, #1e1530);
        }

        .login-card {
            background-color: var(--bs-card-bg);
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            width: 100%;
            max-width: 400px;
            padding: 2rem;
            border: 1px solid var(--bs-border-color);
        }

        .login-logo {
            text-align: center;
            margin-bottom: 2rem;
            color: var(--secondary-color);
        }

        .login-logo i {
            font-size: 3rem;
            margin-bottom: 1rem;
        }

        .form-control {
            background-color: rgba(0, 0, 0, 0.2);
            border-color: var(--bs-border-color);
            color: var(--bs-body-color);
        }

        .form-control:focus {
            background-color: rgba(0, 0, 0, 0.3);
            border-color: var(--primary-color);
            color: var(--bs-body-color);
            box-shadow: 0 0 0 0.25rem rgba(156, 39, 176, 0.25);
        }

        .btn-login {
            background-color: var(--primary-color);
            border-color: var(--primary-color);
            width: 100%;
            padding: 0.5rem;
            font-weight: 600;
            transition: all 0.3s;
        }

        .btn-login:hover {
            background-color: #8e24aa;
            border-color: #8e24aa;
            transform: translateY(-2px);
        }

        .login-footer {
            text-align: center;
            margin-top: 1.5rem;
            color: var(--secondary-color);
        }

        .error-message {
            color: var(--error-color);
            text-align: center;
            margin-bottom: 1rem;
        }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="login-logo">
            <i class="bi bi-robot"></i>
            <h3>ZXC-USERBOT</h3>
            <p>Admin Panel</p>
        </div>

        {% if error %}
        <div class="error-message">
            <i class="bi bi-exclamation-triangle-fill"></i> {{ error }}
        </div>
        {% endif %}

        <form action="/login" method="post">
            <div class="mb-3">
                <label for="username" class="form-label">Username</label>
                <input type="text" class="form-control" id="username" name="username" required>
            </div>
            <div class="mb-3">
                <label for="password" class="form-label">Password</label>
                <input type="password" class="form-control" id="password" name="password" required>
            </div>
            <div class="mb-3 form-check">
                <input type="checkbox" class="form-check-input" id="remember" name="remember">
                <label class="form-check-label" for="remember">Remember me</label>
            </div>
            <button type="submit" class="btn btn-login">Login</button>
        </form>

        <div class="login-footer">
            <small>Version 2.4.1 | &copy; 2023 ZXC-USERBOT</small>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
